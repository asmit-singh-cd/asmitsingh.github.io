<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asmit | Coder</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    color: white;
    overflow-x: hidden;
}

/* 🔥 Loader */
#loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.loader-text {
    font-size: 30px;
    letter-spacing: 5px;
    animation: fade 1.5s infinite alternate;
}

@keyframes fade {
    from { opacity: 0.3 }
    to { opacity: 1 }
}

/* Hide main */
#main {
    display: none;
}

/* 🎬 VIDEO BACKGROUND */
.video-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* Overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* Sections */
.section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    flex-direction: column;
    position: relative;

    opacity: 0;
    transform: translateY(50px);
    transition: 1s;
}

.section.show {
    opacity: 1;
    transform: translateY(0);
}

/* Text */
h1 {
    font-size: 65px;
}

p {
    font-size: 22px;
    color: #ddd;
}

/* Button */
button {
    margin-top: 20px;
    padding: 12px 30px;
    border: none;
    border-radius: 30px;
    background: white;
    color: black;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ddd;
}

/* Cards */
.cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 20px;
    border-radius: 20px;
    width: 250px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}
/* 🔥 Cursor Glow */
.cursor-glow {
    position: fixed;
    width: 150px;
    height: 150px;
    background: radial-gradient(circle, rgba(0,255,255,0.3), transparent 70%);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 9999;
    transition: transform 0.1s ease;
}    
</style>
</head>

<body>
<div class="cursor-glow" id="cursorGlow"></div>    

<!-- 🔥 Loader -->
<div id="loader">
    <div class="loader-text">ASMIT</div>
</div>

<div id="main">

<!-- 🎬 HERO WITH VIDEO -->
<section class="section">
    <video autoplay muted loop class="video-bg">
        <source src="bg.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <h1>Welcome to My World</h1>
    <p>I Build AI • Code • Create the Future 🚀</p>
    <button onclick="alert('Evo AI Launching Soon 🤖')">Explore Evo</button>
</section>

<!-- 💻 PROJECTS -->
<section class="section">
    <h1>My Work</h1>

    <div class="cards">
        <div class="card">
            <h3>Evo AI 🤖</h3>
            <p>Voice Assistant Project</p>
        </div>

        <div class="card">
            <h3>More Coming 🚀</h3>
            <p>Next-gen ideas in progress</p>
        </div>
    </div>
</section>

<!-- 🎯 FUTURE -->
<section class="section">
    <h1>The Future</h1>
    <p>Building intelligent systems for tomorrow</p>
</section>

</div>

<script>
// 🔥 Cursor Effect
const cursor = document.getElementById("cursorGlow");

document.addEventListener("mousemove", (e) => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
});
// 🔥 Loader
window.onload = () => {
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
        document.getElementById("main").style.display = "block";
    }, 1500);
};

// 🔥 Scroll animation
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add("show");
        }
    });
});

document.querySelectorAll(".section").forEach((el) => {
    observer.observe(el);
});
</script>

</body>
</html>
