<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asmit | Coder</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    color: white;
    overflow-x: hidden;
}

/* 🔥 Loader */
#loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.loader-text {
    font-size: 30px;
    letter-spacing: 5px;
    animation: fade 1.5s infinite alternate;
}

@keyframes fade {
    from { opacity: 0.3 }
    to { opacity: 1 }
}

/* Hide main */
#main {
    display: none;
}

/* 🔥 Parallax Section */
.section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    flex-direction: column;

    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    opacity: 0;
    transform: translateY(50px);
    transition: 1s;
}

.section.show {
    opacity: 1;
    transform: translateY(0);
}

/* Different backgrounds */
.hero {
    background: linear-gradient(to bottom, black, #111);
}

.projects {
    background: linear-gradient(to bottom, #111, #000);
}

/* Text */
h1 {
    font-size: 60px;
}

p {
    font-size: 20px;
    color: #ccc;
}

/* Button */
button {
    margin-top: 20px;
    padding: 12px 30px;
    border: none;
    border-radius: 30px;
    background: white;
    color: black;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ddd;
}

/* Cards */
.cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 20px;
    width: 250px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<!-- 🔥 Loader -->
<div id="loader">
    <div class="loader-text">ASMIT</div>
</div>

<div id="main">

<!-- 🚀 HERO -->
<section class="section hero">
    <h1>Hello, I'm Asmit</h1>
    <p>Student • Coder • Building Evo AI 🤖</p>
    <button onclick="alert('Evo AI Coming Soon 🚀')">Explore Evo</button>
</section>

<!-- 💻 PROJECTS -->
<section class="section projects">
    <h1>My Work</h1>
    
    <div class="cards">
        <div class="card">
            <h3>Evo AI 🤖</h3>
            <p>Voice assistant project</p>
        </div>

        <div class="card">
            <h3>More Coming 🚀</h3>
            <p>New innovations loading...</p>
        </div>
    </div>
</section>

<!-- 🎯 FUTURE -->
<section class="section hero">
    <h1>Future Vision</h1>
    <p>Building smart AI tools & real-world projects</p>
</section>

</div>

<script>
// 🔥 Loader
window.onload = () => {
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
        document.getElementById("main").style.display = "block";
    }, 1500);
};

// 🔥 Scroll animation
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add("show");
        }
    });
});

document.querySelectorAll(".section").forEach((el) => {
    observer.observe(el);
});
</script>

</body>
</html>
